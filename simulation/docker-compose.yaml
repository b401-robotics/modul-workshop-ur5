version: '3.8'

services:
  # Service 1: The URSim Robot Simulator
  ursim:
    image: universalrobots/ursim_cb3:latest
    container_name: ursim_cb3
    environment:
      - ACCEPT_EULA=true
      - ROBOT_MODEL=UR5
    volumes:
      - ursim_programs:/ursim/programs
    # We expose the browser VNC/noVNC port to the host machine
    ports:
      - "6080:6080"
    networks:
      ros_robot_net:
        ipv4_address: 172.20.0.10  # Assign a fixed static IP to URSim

  # Service 2: The ROS 2 Driver targeting the fixed URSim IP
  ur_driver:
    build: .
    container_name: ur_ros2_driver
    ipc: host
    environment:
      - ROS_DISTRO=humble
    # The robot_ip parameter is now hardcoded to match URSim's static network IP
    command: >
      ros2 launch ur_robot_driver ur_control.launch.py 
      ur_type:=ur5 
      robot_ip:=172.20.0.10 
      launch_rviz:=false
    networks:
      - ros_robot_net
    depends_on:
      - ursim

  # Service 3: The Foxglove Bridge Node
  foxglove_bridge:
    build: .
    container_name: foxglove_bridge
    ipc: host
    ports:
      - "8765:8765"
    environment:
      - ROS_DISTRO=humble
    networks:
      - ros_robot_net
    depends_on:
      - ur_driver
    # MODIFIED: Forcing the node to bind to 0.0.0.0 and explicitly setting parameters
    command: >
      ros2 run foxglove_bridge foxglove_bridge_node
      --ros-args 
      -p port:=8765 
      -p address:=0.0.0.0 
      -p send_buffer_limit_bytes:=10000000
  
  # Service 4: Containerized Foxglove Studio Web App (Web UI on http://localhost:8081)
  foxglove_studio:
    image: husarion/foxglove:studio
    container_name: foxglove_studio_ui
    ports:
      - "8081:8080" # Maps container's internal 8080 port to host port 8081 to avoid conflict with URSim
    volumes:
      - ./foxglove_config:/foxglove
    networks:
      - ros_robot_net
    depends_on:
      - foxglove_bridge

# Define the custom bridge network with a specified subnet range
networks:
  ros_robot_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  ursim_programs:
    driver: local