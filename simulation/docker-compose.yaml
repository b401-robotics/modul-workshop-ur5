version: '3.8'

services:
  # Service 1: The URSim Robot Simulator
  ursim:
    image: universalrobots/ursim_cb3:latest
    container_name: ursim_cb3
    environment:
      - ACCEPT_EULA=true
      - ROBOT_MODEL=UR5
    volumes:
      - ursim_programs:/ursim/programs
    # We expose the browser VNC/noVNC port to the host machine
    ports:
      - "6080:6080"
      - "29999:29999"
      - "30001-30003:30001-30003"
    networks:
      - ros_robot_net
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "</dev/tcp/127.0.0.1/30002"]
      interval: 5s
      timeout: 5s
      retries: 10
  # Service 2: The ROS 2 Driver targeting the fixed URSim IP
  ur_driver:
    build: .
    container_name: ur_ros2_driver
    ipc: host
    environment:
      - ROS_DISTRO=humble
    # The robot_ip parameter is now hardcoded to match URSim's static network IP
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "source /opt/ros/humble/setup.bash;
       if [ -f /ros2_ws/install/setup.bash ]; then source /ros2_ws/install/setup.bash; fi;
       
       echo 'Starting UR ROS 2 Control Driver in background...';
       ros2 launch ur_robot_driver ur_control.launch.py ur_type:=ur5 robot_ip:=ursim launch_rviz:=false &
       
       echo 'Waiting 15 seconds for driver to finish RTDE handshake with URSim...';
       sleep 15;
       
       echo 'Spawning joint_state_broadcaster...';
       ros2 run controller_manager spawner joint_state_broadcaster;
       
       echo 'Spawning scaled_joint_trajectory_controller...';
       ros2 run controller_manager spawner scaled_joint_trajectory_controller;
       
       echo 'All hardware controllers loaded. keeping container alive...';
       wait"
    networks:
      - ros_robot_net
    depends_on:
       ursim:
          condition: service_healthy

  # Service 3: The Foxglove Bridge Node
  foxglove_bridge:
    build: .
    container_name: foxglove_bridge
    ipc: host
    ports:
      - "8765:8765"
    networks:
      - ros_robot_net
    environment:
      - ROS_DISTRO=humble
    depends_on:
      - ur_driver
    # MODIFIED: Forcing the node to bind to 0.0.0.0 and explicitly setting parameters
    command: >
      ros2 launch foxglove_bridge foxglove_bridge_launch.xml port:=8765

# Define the custom bridge network with a specified subnet range
networks:
  ros_robot_net:
    driver: bridge

volumes:
  ursim_programs:
    driver: local
